# Render manifest for Hero's Journey (backend services)
# Adjust `envVars` values in Render UI or replace placeholders with secrets.
# `WEB_APP_URL` must point to the real Vercel HTTPS domain.
# `CORS_ALLOWED_ORIGINS` must include the same frontend origin.

services:
  - type: web
    name: hero-journey-save-server
    env: docker
    plan: free
    branch: main
    dockerfilePath: Dockerfile
    startCommand: node server/index.js
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: WEB_APP_URL
        value: "https://hero-s-journey-six.vercel.app"
      - key: BOT_WEBHOOK_DOMAIN
        value: "https://hero-s-journey.onrender.com"
      - key: PORT
        value: "3001"
      - key: SAVE_DATA_DIR
        value: "/data"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://hero-s-journey-six.vercel.app"
