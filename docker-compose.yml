version: "3.8"
services:
  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "8080:80"
    restart: unless-stopped

  save-server:
    build:
      context: .
      target: backend
    command: node server/index.js
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - SAVE_DATA_DIR=/data
      - CORS_ALLOWED_ORIGINS=http://localhost:8080
    volumes:
      - ./server/data:/data
    restart: unless-stopped

  bot:
    build:
      context: .
      target: backend
    command: node bot/index.js
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - WEB_APP_URL=http://localhost:8080
    depends_on:
      - save-server
    restart: unless-stopped
